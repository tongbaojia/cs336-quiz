<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CS336 Lecture 1 — Self-Test</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #121a27;
    --panel-2: #0e1521;
    --border: #233044;
    --border-soft: #1a2433;
    --text: #e7eef8;
    --muted: #8a98ad;
    --muted-2: #5f6c80;
    --accent: #7c8cff;
    --accent-2: #a855f7;
    --green: #34d399;
    --green-bg: rgba(52, 211, 153, 0.12);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.12);
    --amber: #fbbf24;
    --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 600px at 80% -10%, #16203200, #0a0e14),
                linear-gradient(180deg, #0b1018, #0a0e14);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, "Inter", sans-serif;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Header */
  header.top { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand h1 { font-size: 20px; margin: 0; letter-spacing: -0.2px; }
  .brand .sub { color: var(--muted); font-size: 13px; }
  .brand .grad { background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }

  .controls { display: flex; align-items: center; gap: 10px; }
  .segmented { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .segmented button { border: 0; background: transparent; color: var(--muted); padding: 6px 12px; font-size: 13px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all .15s ease; }
  .segmented button.active { background: linear-gradient(180deg, #2a3550, #212c44); color: var(--text); box-shadow: inset 0 0 0 1px var(--border); }
  .segmented button:hover:not(.active) { color: var(--text); }
  .btn { border: 1px solid var(--border); background: var(--panel); color: var(--text); padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all .15s ease; }
  .btn:hover { border-color: var(--accent); }
  .btn.ghost { background: transparent; color: var(--muted); }
  .btn.ghost:hover { color: var(--red); border-color: var(--red); }
  .btn.primary { background: linear-gradient(180deg, var(--accent), #5f6fe0); border-color: #5f6fe0; color: white; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Progress */
  .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .bar { flex: 1; height: 8px; background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: 99px; overflow: hidden; }
  .bar > span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .3s ease; }
  .stat { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .stat b { color: var(--text); }
  .score-pill { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); background: var(--panel-2); }

  /* Palette */
  .palette { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }
  .pdot { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--panel-2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: all .12s ease; position: relative; }
  .pdot:hover { transform: translateY(-1px); border-color: var(--accent); color: var(--text); }
  .pdot.answered { background: #1d2740; color: var(--text); border-color: #34406a; }
  .pdot.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .pdot.incorrect { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .pdot.current { outline: 2px solid var(--accent); outline-offset: 2px; }
  .pdot .seg { position: absolute; top: -16px; left: 0; font-size: 9px; color: var(--muted-2); }

  /* Card */
  .card { background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; box-shadow: var(--shadow); }
  .qmeta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 4px 10px; border-radius: 99px; background: rgba(124, 140, 255, 0.12); color: var(--accent); border: 1px solid rgba(124,140,255,0.25); }
  .qnum { color: var(--muted); font-size: 13px; font-weight: 600; }
  .qtext { font-size: 19px; font-weight: 600; margin: 0 0 20px; letter-spacing: -0.2px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel-2); cursor: pointer; transition: all .12s ease; text-align: left; color: var(--text); font-size: 15px; width: 100%; }
  .opt:hover { border-color: var(--accent); background: #131c2c; }
  .opt .key { flex: none; width: 24px; height: 24px; border-radius: 7px; border: 1px solid var(--border); display: grid; place-items: center; font-size: 12px; font-weight: 800; color: var(--muted); background: var(--panel); }
  .opt.selected { border-color: var(--accent); background: #18233a; box-shadow: inset 0 0 0 1px var(--accent); }
  .opt.selected .key { background: var(--accent); color: white; border-color: var(--accent); }
  .opt.correct { border-color: var(--green); background: var(--green-bg); box-shadow: inset 0 0 0 1px var(--green); }
  .opt.correct .key { background: var(--green); color: #06281d; border-color: var(--green); }
  .opt.incorrect { border-color: var(--red); background: var(--red-bg); box-shadow: inset 0 0 0 1px var(--red); }
  .opt.incorrect .key { background: var(--red); color: #2a0a0a; border-color: var(--red); }
  .opt.locked { cursor: default; }
  .opt .mark { margin-left: auto; font-weight: 800; font-size: 15px; }
  .opt.correct .mark { color: var(--green); }
  .opt.incorrect .mark { color: var(--red); }

  .explain { margin-top: 18px; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border-soft); background: rgba(124,140,255,0.06); font-size: 14px; color: var(--text); display: none; }
  .explain.show { display: block; animation: fade .2s ease; }
  .explain .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--accent); margin-bottom: 4px; }
  .explain.good { border-color: rgba(52,211,153,0.4); background: var(--green-bg); }
  .explain.good .lbl { color: var(--green); }
  .explain.bad { border-color: rgba(248,113,113,0.35); background: var(--red-bg); }
  .explain.bad .lbl { color: var(--red); }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to {opacity:1; transform:none;} }

  /* Nav */
  .nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 20px; }
  .nav .hint { font-size: 12px; color: var(--muted-2); }
  kbd { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; background: var(--panel-2); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--muted); }

  /* Results */
  .results .hero { text-align: center; padding: 10px 0 6px; }
  .ring { --p: 0; width: 150px; height: 150px; border-radius: 50%; margin: 6px auto 14px; display: grid; place-items: center;
          background: conic-gradient(var(--accent) calc(var(--p) * 1%), var(--panel-2) 0); position: relative; }
  .ring::before { content: ""; position: absolute; inset: 12px; border-radius: 50%; background: var(--panel); border: 1px solid var(--border); }
  .ring .inner { position: relative; text-align: center; }
  .ring .pct { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
  .ring .frac { font-size: 13px; color: var(--muted); }
  .verdict { font-size: 16px; font-weight: 600; margin: 4px 0 2px; }
  .breakdown { margin: 22px 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .breakdown .row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; border-bottom: 1px solid var(--border-soft); font-size: 14px; }
  .breakdown .row:last-child { border-bottom: 0; }
  .breakdown .row .name { flex: 1; color: var(--text); }
  .breakdown .row .mini { flex: none; width: 120px; height: 7px; background: var(--panel-2); border-radius: 99px; overflow: hidden; }
  .breakdown .row .mini > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  .breakdown .row .frac { width: 48px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }

  .review-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .rev { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; background: var(--panel-2); }
  .rev .q { font-weight: 600; margin: 0 0 8px; font-size: 15px; }
  .rev .line { font-size: 13.5px; margin: 3px 0; }
  .rev .you { color: var(--red); }
  .rev .ok { color: var(--green); }
  .rev .na { color: var(--amber); }
  .rev .why { color: var(--muted); margin-top: 7px; font-size: 13px; }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 26px 0 10px; font-weight: 700; }
  .empty-good { text-align: center; color: var(--green); padding: 18px; font-weight: 600; }
  .foot-note { text-align: center; color: var(--muted-2); font-size: 12px; margin-top: 28px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>CS336 · <span class="grad">Lecture 1 Self-Test</span></h1>
      <div class="sub">Overview &amp; tokenization (+ resource-accounting bonus) — 20 questions</div>
    </div>
    <div class="controls">
      <div class="segmented" id="modeToggle">
        <button data-mode="exam">Exam</button>
        <button data-mode="practice">Practice</button>
      </div>
      <button class="btn ghost" id="resetBtn">Reset</button>
    </div>
  </header>

  <div class="progress-row">
    <div class="bar"><span id="progressFill"></span></div>
    <div class="stat" id="answeredStat">answered <b>0</b>/20</div>
    <div class="score-pill" id="scorePill" style="display:none;">0 / 20</div>
  </div>

  <div class="palette" id="palette"></div>

  <div id="main"></div>

  <div class="foot-note">Progress is saved automatically in this browser. Mode: <span id="modeLabel">Exam</span>.</div>
</div>

<script>
const QUESTIONS = [
  { id:1, section:"Philosophy & framing", q:"The lecture's correct reading of \u201cthe bitter lesson\u201d is:",
    options:[
      "Scale is all that matters; algorithms are irrelevant",
      "Algorithms that scale are what matter",
      "Bigger models always beat smaller ones regardless of data",
      "Hand-engineered features win at scale"],
    answer:1, explain:"\u201cAlgorithms that scale is what matters.\u201d Framed as accuracy = efficiency \u00d7 resources." },
  { id:2, section:"Philosophy & framing", q:"Under accuracy = efficiency \u00d7 resources, as scale grows, efficiency:",
    options:[
      "Matters less, since you have more compute to burn",
      "Stays equally important",
      "Matters more \u2014 you can't afford to be wasteful",
      "Becomes irrelevant next to raw resources"],
    answer:2, explain:"Efficiency matters more at larger scale; waste is unaffordable." },
  { id:3, section:"Philosophy & framing", q:"Of the three knowledge types (mechanics, mindset, intuitions), which transfer reliably to frontier scale?",
    options:[
      "Only intuitions",
      "Mechanics and mindset",
      "Only mechanics",
      "All three equally"],
    answer:1, explain:"Mechanics + mindset transfer; intuitions only partially (don't necessarily carry across scales)." },
  { id:4, section:"Philosophy & framing", q:"Which is cited as evidence that sub-1B \u201cfrom scratch\u201d models may not be representative of frontier models?",
    options:[
      "Tokenizer vocab shrinks with scale",
      "The fraction of FLOPs in attention vs. MLP shifts with scale (and capabilities emerge with scale)",
      "Learning rate is scale-invariant",
      "Batch size stops mattering at scale"],
    answer:1, explain:"\u201cMore is different\u201d: attention/MLP FLOP split changes with scale (Roller); emergence (Wei et al.)." },
  { id:5, section:"Landscape & openness", q:"In the lecture's taxonomy, an open-weight model (e.g., DeepSeek) gives you:",
    options:[
      "API access only",
      "Weights + architecture/some training details, but no data details",
      "Weights + full training data + all rationale and failed experiments",
      "A paper only, no weights"],
    answer:1, explain:"Open-weight = weights + arch/some training details, no data. Open-source (OLMo) adds data + most details." },
  { id:6, section:"Landscape & openness", q:"Match the contribution the lecture attributes to each model:",
    options:[
      "GPT-3 \u2192 compute-optimal scaling; Chinchilla \u2192 in-context learning",
      "GPT-3 \u2192 in-context learning; Chinchilla \u2192 compute-optimal scaling laws",
      "T5 \u2192 staged release; BERT \u2192 text-to-text",
      "GPT-2 \u2192 175B scale; PaLM \u2192 first zero-shot"],
    answer:1, explain:"GPT-3 = in-context learning; Chinchilla (70B) = compute-optimal scaling laws." },
  { id:7, section:"Systems, inference, scaling", q:"Inference has two phases. Which is memory-bound, and why?",
    options:[
      "Prefill \u2014 all prompt tokens processed at once",
      "Decode \u2014 tokens generated one at a time",
      "Both are compute-bound",
      "Prefill \u2014 because of KV-cache reads"],
    answer:1, explain:"Decode generates one token at a time (memory-bound); prefill processes the prompt at once (compute-bound)." },
  { id:8, section:"Systems, inference, scaling", q:"What does the lecture claim about global compute?",
    options:[
      "Training always dominates",
      "Training \u2248 inference",
      "Inference (every use) exceeds training (one-time cost)",
      "Inference is negligible"],
    answer:2, explain:"Globally, inference compute (every use) exceeds the one-time training cost." },
  { id:9, section:"Systems, inference, scaling", q:"Speculative decoding speeds up generation by:",
    options:[
      "Approximating the output distribution (trades accuracy for speed)",
      "Using a cheap draft model to propose multiple tokens, then scoring them in parallel with the full model \u2014 exact decoding",
      "Skipping low-probability tokens",
      "Precomputing all continuations"],
    answer:1, explain:"Draft model proposes, full model verifies in parallel. Crucially, decoding stays exact." },
  { id:10, section:"Systems, inference, scaling", q:"The Chinchilla compute-optimal rule of thumb quoted in the lecture is:",
    options:[
      "D* = 2 N*",
      "D* = 20 N* (e.g., a 1.4B model \u2192 ~28B tokens)",
      "N* = 20 D*",
      "D* = N*\u00b2"],
    answer:1, explain:"D* = 20 N*: a compute-optimal 1.4B-param model trains on ~28B tokens." },
  { id:11, section:"Systems, inference, scaling", q:"What caveat does the lecture attach to the D* = 20 N* rule?",
    options:[
      "It ignores the optimizer",
      "It doesn't account for inference costs",
      "It only holds for vision",
      "It requires multiple epochs"],
    answer:1, explain:"It ignores inference costs \u2014 why labs over-train small models (e.g., Llama-3 8B)." },
  { id:12, section:"Tokenization", q:"A tokenizer is best described as:",
    options:[
      "A next-word predictor",
      "A reversible map between strings and sequences of integer tokens",
      "A weight-compression scheme",
      "A stop-word remover"],
    answer:1, explain:"Strings \u2194 integer tokens, reversible via encode()/decode()." },
  { id:13, section:"Tokenization", q:"The main problem with character-based (Unicode code-point) tokenization:",
    options:[
      "Sequences are far too long",
      "Huge vocabulary (~150K) with many rare, inefficiently-used characters",
      "Unseen tokens become UNK",
      "It can't round-trip"],
    answer:1, explain:"~150K Unicode chars \u2192 huge vocab, many rare/wasted. (Too-long sequences is the byte problem.)" },
  { id:14, section:"Tokenization", q:"A pure byte-level (UTF-8) tokenizer has vocab 256 and compression ratio = 1. Why is ratio = 1 bad?",
    options:[
      "It wastes vocabulary",
      "Sequences become too long \u2014 costly because attention is quadratic in sequence length",
      "It loses information",
      "It can't decode emoji"],
    answer:1, explain:"1 byte/token \u2192 very long sequences, and attention cost is quadratic in length." },
  { id:15, section:"Tokenization", q:"A key drawback of word-based tokenization the lecture stresses:",
    options:[
      "Vocab is fixed at 256",
      "Unseen words map to UNK, which is ugly and can corrupt perplexity",
      "Compression ratio is 1",
      "It can't represent spaces"],
    answer:1, explain:"Out-of-vocabulary words \u2192 UNK (ugly, breaks perplexity); also huge/unbounded vocab." },
  { id:16, section:"Tokenization", q:"The core training step of BPE is:",
    options:[
      "Split into words, assign each a random integer",
      "Start from bytes and repeatedly merge the most frequent adjacent pair",
      "Merge the least frequent pairs to save vocab",
      "Cluster characters by embedding similarity"],
    answer:1, explain:"Begin with bytes; greedily merge the most common adjacent token pair, num_merges times." },
  { id:17, section:"Tokenization", q:"BPE's origin and adoption, per the lecture:",
    options:[
      "Speech recognition (1994) \u2192 BERT",
      "Data compression (Gage, 1994) \u2192 adapted to NLP (Sennrich, 2016) \u2192 popularized by GPT-2",
      "Machine translation \u2192 T5",
      "Image coding \u2192 GPT-3"],
    answer:1, explain:"Philip Gage 1994 (compression) \u2192 Sennrich 2016 (NMT) \u2192 GPT-2." },
  { id:18, section:"Tokenization", q:"compression_ratio = num_bytes / num_tokens. A higher ratio means:",
    options:[
      "Longer sequences (worse)",
      "Fewer tokens per unit of text \u2014 shorter sequences, more efficient",
      "A bigger vocabulary",
      "More UNK tokens"],
    answer:1, explain:"Higher bytes/token \u2192 each token covers more text \u2192 shorter sequences \u2192 better." },
  { id:19, section:"Bonus: resource accounting", q:"Total training FLOPs for N params over D tokens \u2248",
    options:[ "2ND", "4ND", "6ND", "3ND" ],
    answer:2, explain:"6ND = forward (2ND) + backward (4ND). Inference per token \u2248 2N." },
  { id:20, section:"Bonus: resource accounting", q:"The backward pass is ~2\u00d7 the forward FLOPs because:",
    options:[
      "It recomputes activations",
      "Each weight computes both its own gradient and the gradient passed to the previous layer",
      "The optimizer runs twice",
      "Gradients use higher precision"],
    answer:1, explain:"Two grad matmuls per weight: \u2202L/\u2202w (to update it) + \u2202L/\u2202input (to relay the signal back)." },
];

const KEY = "cs336_l1_quiz_v1";
const LETTERS = ["A","B","C","D"];
const TOTAL = QUESTIONS.length;

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return { idx: s.idx ?? 0, answers: s.answers ?? {}, mode: s.mode ?? "exam", submitted: !!s.submitted, view: s.view ?? "quiz" };
    }
  } catch (e) {}
  return { idx: 0, answers: {}, mode: "exam", submitted: false, view: "quiz" };
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

// feedback is visible when practice-mode-and-answered, or after submit
function feedbackOn(qid) {
  return state.submitted || (state.mode === "practice" && state.answers[qid] !== undefined);
}
function answeredCount() { return QUESTIONS.filter(q => state.answers[q.id] !== undefined).length; }
function correctCount() { return QUESTIONS.filter(q => state.answers[q.id] === q.answer).length; }
function statusOf(q) {
  const a = state.answers[q.id];
  if (a === undefined) return "empty";
  if (state.mode === "practice" || state.submitted) return a === q.answer ? "correct" : "incorrect";
  return "answered";
}

function render() {
  // mode toggle
  document.querySelectorAll("#modeToggle button").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
  document.getElementById("modeLabel").textContent = state.mode === "exam" ? "Exam" : "Practice";

  // progress
  const ans = answeredCount();
  document.getElementById("progressFill").style.width = (ans / TOTAL * 100) + "%";
  document.getElementById("answeredStat").innerHTML = `answered <b>${ans}</b>/${TOTAL}`;
  const pill = document.getElementById("scorePill");
  if (state.mode === "practice" || state.submitted) {
    pill.style.display = "inline-block";
    pill.textContent = `${correctCount()} / ${TOTAL} correct`;
  } else { pill.style.display = "none"; }

  renderPalette();
  if (state.view === "results") renderResults();
  else renderQuestion();
  save();
}

function renderPalette() {
  const pal = document.getElementById("palette");
  pal.innerHTML = "";
  let lastSection = null;
  QUESTIONS.forEach((q, i) => {
    const d = document.createElement("button");
    d.className = "pdot " + statusOf(q) + (i === state.idx && state.view === "quiz" ? " current" : "");
    d.textContent = q.id;
    d.title = q.section;
    if (q.section !== lastSection) {
      lastSection = q.section;
    }
    d.onclick = () => { state.view = "quiz"; state.idx = i; render(); };
    pal.appendChild(d);
  });
}

function renderQuestion() {
  const q = QUESTIONS[state.idx];
  const fb = feedbackOn(q.id);
  const chosen = state.answers[q.id];
  const main = document.getElementById("main");

  const opts = q.options.map((text, i) => {
    let cls = "opt";
    if (fb) {
      cls += " locked";
      if (i === q.answer) cls += " correct";
      else if (i === chosen) cls += " incorrect";
    } else if (i === chosen) cls += " selected";
    let mark = "";
    if (fb && i === q.answer) mark = '<span class="mark">\u2713</span>';
    else if (fb && i === chosen && chosen !== q.answer) mark = '<span class="mark">\u2717</span>';
    return `<button class="${cls}" data-opt="${i}">
        <span class="key">${LETTERS[i]}</span>
        <span class="txt">${text}</span>${mark}
      </button>`;
  }).join("");

  let explainHtml = "";
  if (fb) {
    const right = chosen === q.answer;
    const cls = chosen === undefined ? "" : (right ? "good" : "bad");
    const lbl = chosen === undefined ? "Answer" : (right ? "Correct" : "Not quite");
    explainHtml = `<div class="explain show ${cls}">
        <div class="lbl">${lbl} \u00b7 ${LETTERS[q.answer]}</div>${q.explain}</div>`;
  }

  const isLast = state.idx === TOTAL - 1;
  main.innerHTML = `
    <div class="card">
      <div class="qmeta">
        <span class="badge">${q.section}</span>
        <span class="qnum">Question ${q.id} of ${TOTAL}</span>
      </div>
      <p class="qtext">${q.q}</p>
      <div class="options" id="options">${opts}</div>
      ${explainHtml}
      <div class="nav">
        <button class="btn" id="prevBtn" ${state.idx === 0 ? "disabled" : ""}>\u2190 Prev</button>
        <span class="hint">Keys <kbd>A</kbd>\u2013<kbd>D</kbd> answer \u00b7 <kbd>\u2190</kbd><kbd>\u2192</kbd> move</span>
        ${isLast
          ? `<button class="btn primary" id="finishBtn">Finish \u2192</button>`
          : `<button class="btn" id="nextBtn">Next \u2192</button>`}
      </div>
    </div>`;

  document.querySelectorAll("#options .opt").forEach(b => {
    b.onclick = () => selectOption(parseInt(b.dataset.opt, 10));
  });
  const prev = document.getElementById("prevBtn");
  if (prev) prev.onclick = () => go(-1);
  const next = document.getElementById("nextBtn");
  if (next) next.onclick = () => go(1);
  const finish = document.getElementById("finishBtn");
  if (finish) finish.onclick = goResults;
}

function selectOption(i) {
  const q = QUESTIONS[state.idx];
  if (feedbackOn(q.id) && state.mode !== "practice") return; // locked after submit in exam
  state.answers[q.id] = i;
  render();
}

function go(delta) {
  const ni = state.idx + delta;
  if (ni < 0 || ni >= TOTAL) return;
  state.idx = ni;
  render();
}

function goResults() {
  state.submitted = true;
  state.view = "results";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderResults() {
  const score = correctCount();
  const pct = Math.round(score / TOTAL * 100);
  const verdict = pct >= 90 ? "Crushed it." : pct >= 75 ? "Solid grasp." : pct >= 50 ? "Decent \u2014 review the misses." : "Worth a rewatch.";

  // section breakdown
  const sections = [];
  QUESTIONS.forEach(q => {
    let s = sections.find(x => x.name === q.section);
    if (!s) { s = { name: q.section, total: 0, correct: 0 }; sections.push(s); }
    s.total++;
    if (state.answers[q.id] === q.answer) s.correct++;
  });

  const wrong = QUESTIONS.filter(q => state.answers[q.id] !== q.answer);

  const rows = sections.map(s => `
    <div class="row">
      <span class="name">${s.name}</span>
      <span class="mini"><span style="width:${s.correct/s.total*100}%"></span></span>
      <span class="frac">${s.correct}/${s.total}</span>
    </div>`).join("");

  const reviewHtml = wrong.length === 0
    ? `<div class="empty-good">\u2713 Perfect score \u2014 every question correct.</div>`
    : wrong.map(q => {
        const a = state.answers[q.id];
        const yourLine = a === undefined
          ? `<div class="line na">Your answer: \u2014 (skipped)</div>`
          : `<div class="line you">Your answer: ${LETTERS[a]}. ${q.options[a]}</div>`;
        return `<div class="rev">
          <p class="q">Q${q.id}. ${q.q}</p>
          ${yourLine}
          <div class="line ok">Correct: ${LETTERS[q.answer]}. ${q.options[q.answer]}</div>
          <div class="why">${q.explain}</div>
        </div>`;
      }).join("");

  document.getElementById("main").innerHTML = `
    <div class="card results">
      <div class="hero">
        <div class="ring" style="--p:${pct}">
          <div class="inner">
            <div class="pct">${pct}%</div>
            <div class="frac">${score} / ${TOTAL}</div>
          </div>
        </div>
        <div class="verdict">${verdict}</div>
      </div>
      <div class="breakdown">${rows}</div>
      <div class="section-title">Review ${wrong.length ? `(${wrong.length} to revisit)` : ""}</div>
      <div class="review-list">${reviewHtml}</div>
      <div class="nav">
        <button class="btn" id="backBtn">\u2190 Back to questions</button>
        <button class="btn primary" id="restartBtn">Restart quiz</button>
      </div>
    </div>`;

  document.getElementById("backBtn").onclick = () => {
    state.view = "quiz";
    const firstWrong = QUESTIONS.findIndex(q => state.answers[q.id] !== q.answer);
    state.idx = firstWrong >= 0 ? firstWrong : 0;
    render();
  };
  document.getElementById("restartBtn").onclick = reset;
}

function reset() {
  if (!confirm("Clear all answers and start over?")) return;
  state = { idx: 0, answers: {}, mode: state.mode, submitted: false, view: "quiz" };
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// mode toggle
document.querySelectorAll("#modeToggle button").forEach(b => {
  b.onclick = () => { state.mode = b.dataset.mode; render(); };
});
document.getElementById("resetBtn").onclick = reset;

// keyboard
document.addEventListener("keydown", (e) => {
  if (state.view === "results") return;
  const k = e.key.toLowerCase();
  const letterIdx = ["a","b","c","d"].indexOf(k);
  const numIdx = ["1","2","3","4"].indexOf(k);
  if (letterIdx >= 0) { selectOption(letterIdx); e.preventDefault(); }
  else if (numIdx >= 0) { selectOption(numIdx); e.preventDefault(); }
  else if (e.key === "ArrowRight") { go(1); e.preventDefault(); }
  else if (e.key === "ArrowLeft") { go(-1); e.preventDefault(); }
  else if (e.key === "Enter") {
    if (state.idx === TOTAL - 1) goResults(); else go(1);
    e.preventDefault();
  }
});

render();
</script>
</body>
</html>
